<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I LOVE YOU</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf6ee;
      --blush: #e8c4b8;
      --rose: #c0626a;
      --deep: #7a2230;
      --gold: #c9a96e;
      --dark: #1a0a0d;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--rose);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: transform 0.1s, background 0.3s;
      mix-blend-mode: screen;
    }

    /* Night sky canvas */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10,2,5,0.85) 100%);
      pointer-events: none;
    }

    /* Floating petals */
    .petals-container {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      top: -40px;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      5%   { opacity: 0.7; }
      95%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(720deg) scale(1.1); opacity: 0; }
    }

    /* Main container */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Glowing ring */
    .ring {
      position: absolute;
      width: min(420px, 80vw);
      height: min(420px, 80vw);
      border-radius: 50%;
      border: 1px solid rgba(201, 169, 110, 0.2);
      box-shadow: 0 0 60px rgba(201,169,110,0.08), inset 0 0 60px rgba(201,169,110,0.05);
      animation: ringPulse 4s ease-in-out infinite;
    }
    .ring2 {
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      border-color: rgba(192, 98, 106, 0.1);
      animation: ringPulse 4s ease-in-out infinite 1s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.03); opacity: 1; }
    }

    /* Heart SVG */
    .heart-wrap {
      position: relative;
      margin-bottom: 2.5rem;
      animation: floatHeart 5s ease-in-out infinite;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    .heart-svg {
      width: 100px;
      height: 90px;
      filter: drop-shadow(0 0 18px rgba(192,98,106,0.7)) drop-shadow(0 0 40px rgba(192,98,106,0.4));
      animation: heartBeat 1.8s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.12); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.06); }
      70%      { transform: scale(1); }
    }

    /* Headline */
    .headline {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.25em;
      line-height: 1;
      text-shadow:
        0 0 30px rgba(232,196,184,0.4),
        0 0 80px rgba(192,98,106,0.2);
      opacity: 0;
      animation: revealUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }

    .headline span {
      display: inline-block;
      color: var(--rose);
      text-shadow:
        0 0 20px rgba(192,98,106,0.8),
        0 0 60px rgba(192,98,106,0.5);
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.8rem auto;
      opacity: 0;
      animation: revealUp 1s ease 0.8s forwards;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.45rem);
      font-weight: 300;
      font-style: italic;
      color: var(--blush);
      letter-spacing: 0.12em;
      line-height: 2;
      max-width: 560px;
      opacity: 0;
      animation: revealUp 1.2s ease 1.1s forwards;
      text-shadow: 0 0 20px rgba(232,196,184,0.3);
    }

    .signature {
      margin-top: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: revealUp 1s ease 1.6s forwards;
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Click ripple */
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,98,106,0.35), transparent 70%);
      pointer-events: none;
      transform: scale(0);
      animation: rippleOut 1s ease-out forwards;
      z-index: 10;
    }

    @keyframes rippleOut {
      to { transform: scale(1); opacity: 0; }
    }

    /* Sparkles on click */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      font-size: 1.1rem;
      animation: sparkleAway 0.9s ease-out forwards;
    }

    @keyframes sparkleAway {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to   { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="stars-canvas"></canvas>
<div class="vignette"></div>
<div class="petals-container" id="petals"></div>

<div class="scene">
  <div class="ring ring2"></div>
  <div class="ring"></div>

  <div class="heart-wrap">
    <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#e88a94"/>
          <stop offset="60%" stop-color="#c0626a"/>
          <stop offset="100%" stop-color="#7a2230"/>
        </radialGradient>
      </defs>
      <path d="M50 85 C50 85 5 55 5 28 C5 13 17 3 30 3 C38 3 45 8 50 15 C55 8 62 3 70 3 C83 3 95 13 95 28 C95 55 50 85 50 85Z"
            fill="url(#hg)"/>
    </svg>
  </div>

  <h1 class="headline">I <span>♥</span> YOU</h1>
  <div class="divider"></div>
  <p class="subtitle">
    In every heartbeat, in every quiet moment,<br>
    in every breath — it is always, only you.
  </p>
  <p class="signature">Forever &amp; Always</p>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  // Stars canvas
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 220 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.003,
      phase: Math.random() * Math.PI * 2
    }));
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,240,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', initStars);

  // Petals
  const petalContainer = document.getElementById('petals');
  const petalChars = ['🌸','🌺','✿','❀','❁','🌹'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.fontSize = (0.9 + Math.random() * 1) + 'rem';
    petalContainer.appendChild(p);
  }

  // Click effects
  document.addEventListener('click', e => {
    // Ripple
    const rip = document.createElement('div');
    rip.className = 'ripple';
    const size = 220;
    rip.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - size/2}px;top:${e.clientY - size/2}px`;
    document.body.appendChild(rip);
    setTimeout(() => rip.remove(), 1000);

    // Sparkles
    const chars = ['♥','✦','✧','★','❋','✿'];
    for (let i = 0; i < 8; i++) {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.textContent = chars[Math.floor(Math.random() * chars.length)];
      const angle = (Math.PI * 2 / 8) * i;
      const dist = 60 + Math.random() * 60;
      sp.style.left = e.clientX + 'px';
      sp.style.top  = e.clientY + 'px';
      sp.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      sp.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      sp.style.color = ['#e88a94','#c9a96e','#fdf6ee','#c0626a'][Math.floor(Math.random()*4)];
      document.body.appendChild(sp);
      setTimeout(() => sp.remove(), 900);
    }
  });
</script>
</body>
</html>
